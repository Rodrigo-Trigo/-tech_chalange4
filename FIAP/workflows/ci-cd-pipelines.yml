name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v2

      - name: Configurar Go
        uses: actions/setup-go@v2
        with:
          go-version: '1.20'

      - name: Rodar testes
        run: go test ./...

      - name: Build imagem Docker
        run: docker build -t fiap/auth-service:latest .

      - name: Push para Docker Hub
        run: echo "Simulação de push da imagem"
